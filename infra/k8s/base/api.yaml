# ============================================================================
# API — NestJS REST + WebSocket gateway (/ws/chat) + Console SSE.
#
# Public via ingress-nginx with TLS (cert-manager). The browser hits this
# directly for WSS; Vercel's web rewrites proxy /api/* here server-side.
#
# command is overridden to SKIP the image's inline `prisma migrate deploy`
# (the db-migrate Job owns schema) so this Deployment is stateless and the HPA
# can scale it without N replicas racing on migrations.
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: argus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: argus-api # kustomize rewrites to the DOCR path + tag
          command: ["/sbin/tini", "--", "sh", "-c", "exec node apps/api/dist/main.js"]
          ports:
            - { containerPort: 4000, name: http }
          envFrom:
            - configMapRef:
                name: argus-config
            - secretRef:
                name: argus-secrets
          env:
            - name: PORT
              value: "4000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: argus
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: argus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: argus
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # WebSocket (/ws/chat) + SSE (Console live feed) need long-lived upstream
    # connections and unbuffered proxying, or nginx cuts them at ~60s / holds
    # the SSE stream in a buffer.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api-argus.duckdns.org
      secretName: api-argus-tls
  rules:
    - host: api-argus.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
