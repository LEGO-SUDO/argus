# ============================================================================
# TEMPLATE — do NOT commit a filled-in copy of this file.
#
# Create the real Secret out-of-band (kept out of git / kustomize):
#
#   kubectl create secret generic argus-secrets -n argus \
#     --from-literal=DATABASE_URL='postgresql://USER:PASS@ep-xxx.REGION.aws.neon.tech/argus?sslmode=require' \
#     --from-literal=SESSION_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=OPENAI_API_KEY='sk-...' \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#     --from-literal=GOOGLE_API_KEY='...' \
#     --from-literal=SENTRY_DSN=''
#
# Notes:
#   - DATABASE_URL must use Neon's DIRECT (unpooled) host + ?sslmode=require.
#     Prisma `migrate deploy` and the app both use this single URL.
#   - Provider keys are only required once MOCK_PROVIDER=false in argus-config.
#   - SESSION_SECRET is mandatory; the api fails fast without it.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: argus-secrets
  namespace: argus
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASS@ep-xxx.REGION.aws.neon.tech/argus?sslmode=require"
  SESSION_SECRET: "REPLACE_WITH_openssl_rand_hex_32"
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
  SENTRY_DSN: ""
