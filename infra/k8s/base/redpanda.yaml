# ============================================================================
# Redpanda — single-node Kafka-API bus as a StatefulSet (cheapest-k8s sizing).
#
# Headless Service gives the pod a stable DNS name
# (redpanda-0.redpanda.argus.svc.cluster.local) which the broker advertises and
# every client bootstraps to. kafkajs follows the advertised address after
# bootstrap, so advertised == client target avoids the classic "connects to
# bootstrap then can't resolve the advertised host" failure.
#
# dev-container mode + 1 replica is fine for a portfolio/demo. For real
# durability run 3 brokers and bump topic --replicas to 3.
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: argus
  labels:
    app: redpanda
spec:
  clusterIP: None # headless — stable per-pod DNS for the advertised listener
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: admin
      port: 9644
      targetPort: 9644
    - name: rpc
      port: 33145
      targetPort: 33145
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: argus
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      terminationGracePeriodSeconds: 30
      # DO block-storage PVCs mount root-owned, but the redpanda image runs as
      # uid/gid 101 and can't write /var/lib/redpanda/data without this.
      # fsGroup makes the kubelet chown the volume to gid 101 on mount.
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.13
          args:
            - redpanda
            - start
            - --mode=dev-container
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --overprovisioned
            - --node-id=0
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda-0.redpanda.argus.svc.cluster.local:9092
            - --rpc-addr=0.0.0.0:33145
            - --advertise-rpc-addr=redpanda-0.redpanda.argus.svc.cluster.local:33145
          ports:
            - { containerPort: 9092, name: kafka }
            - { containerPort: 9644, name: admin }
            - { containerPort: 33145, name: rpc }
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 1500Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - rpk cluster health -X admin.hosts=localhost:9644 --exit-when-healthy
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 45
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: do-block-storage
        resources:
          requests:
            storage: 10Gi
---
# One-shot topic bootstrap. Idempotent (tolerates "already exists"), so it is
# safe to re-apply. Mirrors infra/redpanda/topics.sh: traces=6p, live-events=3p.
apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-bootstrap
  namespace: argus
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: redpandadata/redpanda:v24.2.13
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              BROKER="redpanda-0.redpanda.argus.svc.cluster.local:9092"
              ensure() {
                local log; log="$(mktemp)"
                if rpk topic create "$1" --brokers "$BROKER" --partitions "$2" --replicas 1 2>&1 | tee "$log"; then
                  echo "[bootstrap] topic $1 created"
                elif grep -qi "already exists\|TOPIC_ALREADY_EXISTS" "$log"; then
                  echo "[bootstrap] topic $1 already exists — skipping"
                else
                  echo "[bootstrap] FAILED to create $1"; cat "$log"; exit 1
                fi
              }
              ensure traces 6
              ensure live-events 3
              rpk topic list --brokers "$BROKER"
              echo "[bootstrap] done"
