# Non-secret runtime config shared by api + workers.
#
# In-cluster service DNS (namespace `argus`):
#   redpanda-0.redpanda.argus.svc.cluster.local:9092  (headless StatefulSet pod)
#   otel-collector.argus.svc.cluster.local:4318        (OTLP HTTP)
#   jaeger.argus.svc.cluster.local:16686               (query API for Console)
#
# Secrets (DATABASE_URL, SESSION_SECRET, provider keys, SENTRY_DSN) live in the
# `argus-secrets` Secret — see secret.example.yaml. Never put them here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-config
  namespace: argus
data:
  NODE_ENV: "production"
  # FALSE = use real providers (keys live in argus-secrets). Keep this in the
  # repo (not just a live patch) — CI re-applies this ConfigMap on every deploy,
  # so a live-only override gets reverted. Set TRUE only for a keyless/demo
  # cluster (deterministic mock responses; SDK throws if false with no keys).
  MOCK_PROVIDER: "false"
  CONTEXT_MAX_TOKENS: "6000"

  # Telemetry: api + workers export OTLP to the collector; api queries Jaeger.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  JAEGER_QUERY_URL: "http://jaeger:16686"

  # Redpanda (Kafka API). Clients bootstrap to the stable headless pod DNS,
  # which is also what the broker advertises — single source of truth.
  REDPANDA_BROKERS: "redpanda-0.redpanda.argus.svc.cluster.local:9092"
  REDPANDA_TRACES_TOPIC: "traces"
  LIVE_EVENTS_TOPIC: "live-events"
  LIVE_EVENTS_CONSUMER_GROUP: "api-live-fanout"

  # Provider failover order. All three adapters are verified working against
  # live keys (gemini uses the real streamGenerateContent API).
  PROVIDER_ORDER: "openai,anthropic,gemini"
  # WARNING: do NOT add OPENAI_MODEL/ANTHROPIC_MODEL/GOOGLE_MODEL set to "".
  # The SDK resolves the model via `?? process.env.X ?? DEFAULT_MODEL`, and an
  # empty string is NOT nullish — so "" gets sent as the model id and the
  # provider rejects it (provider_error). Omit the key to use the SDK default,
  # or set a real model id (e.g. OPENAI_MODEL: "gpt-4o").
