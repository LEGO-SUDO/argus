# Let's Encrypt production issuer (HTTP-01 solver via ingress-nginx).
#
# Apply ONCE after installing cert-manager. The api Ingress references this by
# name (cert-manager.io/cluster-issuer: letsencrypt-prod) and cert-manager
# auto-provisions the api-argus-tls Secret.
#
# HTTP-01 needs port 80 reachable on the LoadBalancer and the DNS A record
# (api-argus.duckdns.org) already pointing at the LB IP before the cert can
# be issued. Order: set DNS first, then apply the Ingress.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: singhnakul196@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
